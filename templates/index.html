<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fab Directory System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=20260425-21" />
  </head>
  <body>
    {% raw %}
    <div id="app" :class="['page-shell', { 'page-shell-auth': !isAuthenticated }]">
      <div v-if="authChecking" class="state-panel">
        <div class="spinner"></div>
        <p>正在检查登录状态...</p>
      </div>

      <section v-else-if="!isAuthenticated" class="auth-shell">
        <article class="auth-card card">
          <div class="section-head auth-head">
            <div>
              <p class="eyebrow">Fab Access</p>
              <h1 class="auth-title">Semiconductor Quality Gateway</h1>
              <p class="auth-copy">请输入账号和密码登录系统。默认超级管理员账号为 `admin` / `123456`。</p>
            </div>
          </div>

          <form class="auth-form" @submit.prevent="login">
            <label>
              <span>登录名</span>
              <input v-model.trim="loginForm.username" type="text" autocomplete="username" placeholder="例如：admin" />
            </label>
            <label>
              <span>密码</span>
              <input v-model="loginForm.password" type="password" autocomplete="current-password" placeholder="请输入密码" />
            </label>
            <p v-if="authMessage" class="form-feedback form-error">{{ authMessage }}</p>
            <button class="btn-primary auth-submit" type="submit" :disabled="loginSubmitting">
              {{ loginSubmitting ? '登录中...' : '登录' }}
            </button>
          </form>
        </article>
      </section>

      <template v-else>
        <button class="drawer-toggle" @click="navDrawerOpen = true">目录</button>
        <div v-if="navDrawerOpen" class="drawer-backdrop" @click="navDrawerOpen = false"></div>

        <aside :class="['side-drawer', 'side-drawer-wide', { open: navDrawerOpen }]">
          <div class="drawer-head">
            <div>
              <span>系统目录</span>
              <strong>System Directory</strong>
            </div>
            <button class="drawer-close" @click="navDrawerOpen = false">关闭</button>
          </div>

          <div class="choice-group drawer-mode-switch">
            <button
              type="button"
              :class="['choice-chip', { active: systemMode === 'tasks' }]"
              @click="switchSystem('tasks')"
            >
              任务系统
            </button>
            <button
              type="button"
              :class="['choice-chip', { active: systemMode === 'dashboard' }]"
              @click="switchSystem('dashboard')"
            >
              看板系统
            </button>
          </div>

          <nav v-if="systemMode === 'tasks'" class="drawer-nav">
            <button :class="{ active: taskSection === 'handover' }" @click="taskSection = 'handover'; navDrawerOpen = false">
              <span>Shift</span>
              <strong>交接班记录</strong>
            </button>
            <button :class="{ active: taskSection === 'tasks' }" @click="taskSection = 'tasks'; navDrawerOpen = false">
              <span>Task</span>
              <strong>任务跟踪</strong>
            </button>
            <button v-if="isAdmin" :class="{ active: taskSection === 'users' }" @click="taskSection = 'users'; navDrawerOpen = false">
              <span>Admin</span>
              <strong>用户管理</strong>
            </button>
            <button v-if="isAdmin" :class="{ active: taskSection === 'settings' }" @click="taskSection = 'settings'; navDrawerOpen = false">
              <span>Setup</span>
              <strong>系统设置</strong>
            </button>
          </nav>

          <nav v-else class="drawer-nav">
            <button
              v-for="item in pageList"
              :key="item.key"
              :class="{ active: activePage === item.key }"
              @click="switchPage(item.key)"
            >
              <span>{{ item.navCaption }}</span>
              <strong>{{ item.navLabel }}</strong>
            </button>
          </nav>
        </aside>

        <header class="app-topbar">
          <div class="account-summary">
            <span class="account-kicker">{{ systemMode === 'tasks' ? 'Task System' : 'Dashboard System' }}</span>
            <strong>{{ authUser.displayLabel || authUser.username }}</strong>
            <small>
              姓名：{{ authUser.displayLabel || '--' }}
              <template v-if="authUser.username"> / 账号：{{ authUser.username }}</template>
              <template v-if="authUser.department"> / {{ authUser.department }}</template>
              <template v-if="authUser.role"> / {{ getRoleLabel(authUser.role) }}</template>
            </small>
          </div>
          <div class="topbar-actions">
            <button v-if="systemMode === 'dashboard'" class="btn-primary" @click="openExportDialog">Excel 导出</button>
            <button class="btn-secondary" @click="refreshActivePage">刷新</button>
            <button class="btn-secondary" @click="openProfileDialog">个人信息</button>
            <button class="btn-ghost" @click="logout">退出登录</button>
          </div>
        </header>

        <div v-if="activeSystemLoading" class="state-panel">
          <div class="spinner"></div>
          <p>正在加载系统数据...</p>
        </div>

        <div v-else-if="activeSystemError" class="state-panel state-error">
          <h1>系统加载失败</h1>
          <p>{{ activeSystemError }}</p>
          <button class="btn-primary" @click="refreshActivePage">重新加载</button>
        </div>

        <template v-else-if="systemMode === 'tasks'">
          <header v-if="false" class="hero hero-simple">
            <div>
              <p class="eyebrow">Task System</p>
              <h1>交接班与任务协同系统</h1>
              <p class="hero-copy">登录后默认进入任务系统，统一处理交接班、任务、提醒、统计和导出。</p>
            </div>
          </header>

          <section class="card task-reminder-card">
            <div class="section-head">
              <div>
                <h2>通知提醒</h2>
                <p>包含交接班时间提醒与任务到期提醒。</p>
              </div>
            </div>
            <div class="task-reminder-grid">
              <article class="reminder-block">
                <h3>班次提醒</h3>
                <p v-if="!taskSystem.reminders.shiftReminders.length" class="muted-line">当前没有即将到来的交接班提醒。</p>
                <div v-for="item in taskSystem.reminders.shiftReminders" :key="item.shiftName + item.startTime" class="reminder-item">
                  <strong>{{ item.shiftName }}</strong>
                  <span>{{ formatDateTime(item.startTime) }}，剩余 {{ item.minutesUntil }} 分钟</span>
                </div>
              </article>
              <article class="reminder-block">
                <h3>任务提醒</h3>
                <p v-if="!taskSystem.reminders.dueTasks.length" class="muted-line">当前没有即将到期的任务。</p>
                <div v-for="item in taskSystem.reminders.dueTasks" :key="item.id" class="reminder-item">
                  <strong>{{ item.title }}</strong>
                  <span>{{ item.assigneeUser || '未分配' }} / {{ formatDateTime(item.dueAt) }}</span>
                </div>
              </article>
            </div>
          </section>

          <p v-if="taskActionMessage" :class="['form-feedback', taskActionTone === 'success' ? 'form-success' : 'form-error']">
            {{ taskActionMessage }}
          </p>

          <template v-if="taskSection === 'handover'">
            <section class="filters card">
              <div class="section-head">
                <div>
                  <h2>交接班查询</h2>
                  <p>支持按日期、班次、交接人、接班人和关键词检索。</p>
                </div>
                <div class="button-row">
                  <button class="btn-secondary" type="button" @click="openHandoverForm">新增</button>
                  <button class="btn-secondary" type="button" @click="downloadTaskExport('handover', 'excel')">导出 Excel</button>
                </div>
              </div>
              <div class="task-filter-grid">
                <label>
                  <span>关键词</span>
                  <input v-model.trim="handoverFilters.keyword" type="text" placeholder="搜索标题、情况、注意事项" />
                </label>
                <label>
                  <span>开始日期</span>
                  <input v-model="handoverFilters.dateFrom" type="date" />
                </label>
                <label>
                  <span>结束日期</span>
                  <input v-model="handoverFilters.dateTo" type="date" />
                </label>
                <label>
                  <span>班次</span>
                  <searchable-select v-model="handoverFilters.shiftGroupId" :options="shiftSelectOptions" empty-label="全部"></searchable-select>
                </label>
                <label>
                  <span>交班人</span>
                  <searchable-select v-model="handoverFilters.handoverUser" :options="userSelectOptions" empty-label="全部"></searchable-select>
                </label>
                <label>
                  <span>接班人</span>
                  <searchable-select v-model="handoverFilters.receiverUser" :options="userSelectOptions" empty-label="全部"></searchable-select>
                </label>
              </div>
            </section>

            <section class="task-layout task-layout-list-only">
              <teleport to="body">
                <div v-if="handoverFormOpen" class="modal-layer">
                  <div class="modal-backdrop" aria-hidden="true"></div>
                  <article class="task-entry-dialog card task-form-card" @click.stop>
                <div class="section-head">
                  <div>
                    <h2>创建交接班记录</h2>
                    <p>支持当班情况、注意事项、未完成事项和附件上传。</p>
                  </div>
                  <button class="btn-ghost" type="button" @click="closeHandoverForm">关闭</button>
                </div>
                <form class="task-form-grid" @submit.prevent="submitHandover">
                  <label v-if="false">
                    <span>标题</span>
                    <input v-model.trim="handoverForm.title" type="text" placeholder="例如：晚班交接" />
                  </label>
                  <label>
                    <span>班次</span>
                    <searchable-select v-model="handoverForm.shiftGroupId" :options="shiftSelectOptions" empty-label="请选择"></searchable-select>
                  </label>
                  <label>
                    <span>交班人</span>
                    <input v-model.trim="handoverForm.handoverUser" type="text" readonly class="disabled-input" />
                  </label>
                  <label>
                    <span>接班人</span>
                    <searchable-select v-model="handoverForm.receiverUser" :options="userSelectOptions" empty-label="请选择"></searchable-select>
                  </label>
                  <label>
                    <span>关键词</span>
                    <input v-model.trim="handoverForm.keywords" type="text" placeholder="工单、设备、风险点" />
                  </label>
                  <label class="form-span-2">
                    <span>当班情况</span>
                    <textarea v-model.trim="handoverForm.workSummary" rows="4" placeholder="记录本班运行情况"></textarea>
                  </label>
                  <label>
                    <span>注意事项</span>
                    <textarea v-model.trim="handoverForm.precautions" rows="4" placeholder="需要关注的事项"></textarea>
                  </label>
                  <label>
                    <span>未完成事项</span>
                    <textarea v-model.trim="handoverForm.pendingItems" rows="4" placeholder="待接班继续跟进"></textarea>
                  </label>
                  <label class="form-span-2">
                    <span>附件上传</span>
                    <input type="file" multiple @change="handleFileSelection('handover', $event)" />
                  </label>
                  <p v-if="taskActionMessage" :class="['form-feedback form-span-2', taskActionTone === 'success' ? 'form-success' : 'form-error']">
                    {{ taskActionMessage }}
                  </p>
                  <div class="profile-actions form-span-2">
                    <button class="btn-secondary" type="button" @click="resetHandoverForm">重置</button>
                    <button class="btn-primary" type="submit" :disabled="taskActionSubmitting">{{ taskActionSubmitting ? '保存中...' : '保存交接记录' }}</button>
                  </div>
                </form>
              </article>
                </div>
              </teleport>

              <article class="card task-table-card">
                <div class="section-head">
                  <div>
                    <h2>历史交接班</h2>
                    <p>点击编辑可回填表单继续补充。</p>
                  </div>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>标题</th>
                        <th>班次</th>
                        <th>创建时间</th>
                        <th>交班人</th>
                        <th>接班人</th>
                        <th>未完成事项</th>
                        <th>附件</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr v-for="item in filteredTaskHandovers" :key="item.id">
                        <td>{{ item.title }}</td>
                        <td>{{ item.shiftName }}</td>
                        <td>{{ formatDateTime(item.recordTime) }}</td>
                        <td>{{ item.handoverUser }}</td>
                        <td>{{ item.receiverUser }}</td>
                        <td :title="item.pendingItems">{{ item.pendingItems || '--' }}</td>
                        <td>
                          <a v-for="file in item.attachments" :key="file.id" :href="file.downloadUrl" class="attachment-link">{{ file.originalName }}</a>
                          <span v-if="!item.attachments.length">--</span>
                        </td>
                        <td><button class="btn-ghost table-action" type="button" @click="editHandover(item)">编辑</button></td>
                      </tr>
                      <tr v-if="!filteredTaskHandovers.length">
                        <td colspan="8" class="empty-cell">当前条件下没有交接班记录</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </article>
            </section>
          </template>

          <template v-else-if="taskSection === 'tasks'">
            <section class="filters card">
              <div class="section-head">
                <div>
                  <h2>任务查询</h2>
                  <p>可按关键词、状态、负责人筛选任务并跟踪进度。</p>
                </div>
                <div class="button-row">
                  <button class="btn-secondary" type="button" @click="openTaskForm">新增</button>
                  <button class="btn-secondary" type="button" @click="downloadTaskExport('task', 'excel')">导出 Excel</button>
                </div>
              </div>
              <div class="task-filter-grid">
                <label>
                  <span>关键词</span>
                  <input v-model.trim="taskFilters.keyword" type="text" placeholder="搜索任务标题或描述" />
                </label>
                <label>
                  <span>状态</span>
                  <searchable-select v-model="taskFilters.status" :options="statusSelectOptions" empty-label="全部"></searchable-select>
                </label>
                  <label>
                    <span>负责人</span>
                    <searchable-select v-model="taskFilters.assigneeUser" :options="userSelectOptions" empty-label="全部"></searchable-select>
                  </label>
              </div>
            </section>

            <section class="task-layout task-layout-list-only">
              <teleport to="body">
                <div v-if="taskFormOpen" class="modal-layer">
                  <div class="modal-backdrop" aria-hidden="true"></div>
                  <article class="task-entry-dialog card task-form-card" @click.stop>
                <div class="section-head">
                  <div>
                    <h2>创建与分配任务</h2>
                    <p>任务可关联交接班记录，支持状态、优先级和起止时间。</p>
                  </div>
                  <button class="btn-ghost" type="button" @click="closeTaskForm">关闭</button>
                </div>
                <form class="task-form-grid" @submit.prevent="submitTask">
                  <label>
                    <span>任务标题</span>
                    <input v-model.trim="taskForm.title" type="text" placeholder="例如：跟进异常参数" />
                  </label>
                  <label>
                    <span>状态</span>
                    <searchable-select v-model="taskForm.status" :options="statusSelectOptions" :allow-empty="false"></searchable-select>
                  </label>
                  <label>
                    <span>优先级</span>
                    <searchable-select v-model="taskForm.priority" :options="prioritySelectOptions" :allow-empty="false"></searchable-select>
                  </label>
                  <label>
                    <span>负责人</span>
                    <searchable-select v-model="taskForm.assigneeUser" :options="userSelectOptions" empty-label="未分配"></searchable-select>
                  </label>
                  <label>
                    <span>开始时间</span>
                    <input v-model="taskForm.startAt" type="datetime-local" />
                  </label>
                  <label>
                    <span>到期时间</span>
                    <input v-model="taskForm.dueAt" type="datetime-local" />
                  </label>
                  <label class="form-span-2">
                    <span>关联交接班记录</span>
                    <searchable-select v-model="taskForm.handoverRecordId" :options="handoverRecordSelectOptions" empty-label="不关联"></searchable-select>
                  </label>
                  <label class="form-span-2">
                    <span>任务说明</span>
                    <textarea v-model.trim="taskForm.description" rows="5" placeholder="输入任务背景、处理步骤与要求"></textarea>
                  </label>
                  <label class="form-span-2">
                    <span>附件上传</span>
                    <input type="file" multiple @change="handleFileSelection('task', $event)" />
                  </label>
                  <p v-if="taskActionMessage" :class="['form-feedback form-span-2', taskActionTone === 'success' ? 'form-success' : 'form-error']">
                    {{ taskActionMessage }}
                  </p>
                  <div class="profile-actions form-span-2">
                    <button class="btn-secondary" type="button" @click="resetTaskForm">重置</button>
                    <button class="btn-primary" type="submit" :disabled="taskActionSubmitting">{{ taskActionSubmitting ? '保存中...' : '保存任务' }}</button>
                  </div>
                </form>
              </article>
                </div>
              </teleport>

              <article class="card task-table-card">
                <div class="section-head">
                  <div>
                    <h2>任务清单</h2>
                    <p>展示任务状态、负责人、到期时间和关联记录。</p>
                  </div>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>标题</th>
                        <th>状态</th>
                        <th>优先级</th>
                        <th>负责人</th>
                        <th>创建时间</th>
                        <th>开始时间</th>
                        <th>到期时间</th>
                        <th>关联交接</th>
                        <th>附件</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr v-for="item in filteredTaskItems" :key="item.id">
                        <td :title="item.description">{{ item.title }}</td>
                        <td>{{ item.status }}</td>
                        <td>{{ item.priority }}</td>
                        <td>{{ item.assigneeUser || '--' }}</td>
                        <td>{{ formatDateTime(item.createdAt) }}</td>
                        <td>{{ formatDateTime(item.startAt) }}</td>
                        <td>{{ formatDateTime(item.dueAt) }}</td>
                        <td>{{ item.handoverRecordId || '--' }}</td>
                        <td>
                          <a v-for="file in item.attachments" :key="file.id" :href="file.downloadUrl" class="attachment-link">{{ file.originalName }}</a>
                          <span v-if="!item.attachments.length">--</span>
                        </td>
                        <td><button class="btn-ghost table-action" type="button" @click="editTask(item)">编辑</button></td>
                      </tr>
                      <tr v-if="!filteredTaskItems.length">
                        <td colspan="10" class="empty-cell">当前条件下没有任务数据</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </article>
            </section>
          </template>

          <template v-else-if="taskSection === 'users' && isAdmin">
            <section class="filters card">
              <div class="section-head">
                <div>
                  <h2>用户查询</h2>
                  <p>支持按关键词和角色检索账号。</p>
                </div>
                <button class="btn-secondary" type="button" @click="openUserForm">新增</button>
              </div>
              <div class="task-filter-grid">
                <label>
                  <span>关键词</span>
                  <input v-model.trim="userFilters.keyword" type="text" placeholder="搜索用户名、姓名、部门、邮箱、电话" />
                </label>
                <label>
                  <span>用户权限</span>
                  <searchable-select v-model="userFilters.role" :options="roleSelectOptions" empty-label="全部"></searchable-select>
                </label>
              </div>
            </section>

            <section class="task-layout task-layout-list-only">
              <teleport to="body">
                <div v-if="userFormOpen" class="modal-layer">
                  <div class="modal-backdrop" aria-hidden="true"></div>
                  <article class="task-entry-dialog card task-form-card" @click.stop>
                <div class="section-head">
                  <div>
                    <h2>用户管理</h2>
                    <p>超级管理员可创建账号并设置角色。</p>
                  </div>
                  <button class="btn-ghost" type="button" @click="closeUserForm">关闭</button>
                </div>
                <form class="task-form-grid" @submit.prevent="submitUser">
                  <label>
                    <span>用户名</span>
                    <input v-model.trim="userForm.username" type="text" placeholder="输入登录账号" />
                  </label>
                  <label>
                    <span>姓名</span>
                    <input v-model.trim="userForm.displayName" type="text" placeholder="显示名称" />
                  </label>
                  <label>
                    <span>用户权限</span>
                    <searchable-select v-model="userForm.role" :options="roleSelectOptions" :allow-empty="false"></searchable-select>
                  </label>
                  <label>
                    <span>邮箱</span>
                    <input v-model.trim="userForm.email" type="email" />
                  </label>
                  <label>
                    <span>电话</span>
                    <input v-model.trim="userForm.phone" type="text" />
                  </label>
                  <label>
                    <span>部门</span>
                    <input v-model.trim="userForm.department" type="text" />
                  </label>
                  <label>
                    <span>密码</span>
                    <input v-model="userForm.password" type="password" placeholder="新建必填，编辑留空不改" />
                  </label>
                  <p v-if="taskActionMessage" :class="['form-feedback form-span-2', taskActionTone === 'success' ? 'form-success' : 'form-error']">
                    {{ taskActionMessage }}
                  </p>
                  <div class="profile-actions form-span-2">
                    <button class="btn-secondary" type="button" @click="resetUserForm">重置</button>
                    <button class="btn-primary" type="submit" :disabled="taskActionSubmitting">{{ taskActionSubmitting ? '保存中...' : '保存用户' }}</button>
                  </div>
                </form>
              </article>
                </div>
              </teleport>

              <article class="card task-table-card">
                <div class="section-head">
                  <div>
                    <h2>账号列表</h2>
                    <p>默认按创建时间排序，点击表头排序，按住 Shift 可叠加多重排序。</p>
                  </div>
                  <button class="btn-secondary" type="button" @click="resetUserSort">重置排序</button>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>
                          <button class="sort-button" type="button" title="点击排序，按住 Shift 可叠加多重排序" @click="toggleUserSort('id', $event)">
                            <strong>ID</strong>
                            <span>{{ getUserSortIndicator('id') }}</span>
                          </button>
                        </th>
                        <th>
                          <button class="sort-button" type="button" title="点击排序，按住 Shift 可叠加多重排序" @click="toggleUserSort('username', $event)">
                            <strong>用户名</strong>
                            <span>{{ getUserSortIndicator('username') }}</span>
                          </button>
                        </th>
                        <th>

                  <span>{{ item.label }}</span>
                </label>
              </div>
            </section>

            <p v-if="exportMessage" :class="['form-feedback', exportMessageTone === 'success' ? 'form-success' : 'form-error']">
              {{ exportMessage }}
            </p>

            <div class="profile-actions">
              <button class="btn-secondary" type="button" @click="resetExportForm">重置筛选</button>
              <button class="btn-primary" type="button" :disabled="exportSubmitting" @click="downloadExport">
                {{ exportSubmitting ? '导出中...' : '开始导出' }}
              </button>
            </div>
          </section>
        </div>
      </teleport>
    </div>
    {% endraw %}

    <script src="{{ url_for('static', filename='vendor/vue.global.prod.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/echarts.min.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}?v=20260425-21"></script>
  </body>
</html>
